# fly.toml app configuration file generated for audit-ai-v7 on 2026-05-16T05:48:45+07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'audit-ai-v7'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  release_command = 'python -m app.init_db'

[env]
  APP_DATA_DIR = '/data'
  APP_ENV = 'production'
  APP_V6_PATH = '/v6'
  APP_WIKI_PATH = '/wiki'
  PORT = '8000'

[[mounts]]
  source = 'audit_data'
  destination = '/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
